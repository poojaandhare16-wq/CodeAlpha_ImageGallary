<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>📸 Alpha Gallery</h1>

    <!-- Filter Buttons -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/400/300" class="gallery-item nature" onclick="openLightbox(this)">
        <img src="https://picsum.photos/id/1011/400/300" class="gallery-item nature" onclick="openLightbox(this)">
        <img src="https://picsum.photos/id/1012/400/300" class="gallery-item city" onclick="openLightbox(this)">
        <img src="https://picsum.photos/id/1016/400/300" class="gallery-item city" onclick="openLightbox(this)">
        <img src="https://picsum.photos/id/1025/400/300" class="gallery-item animals" onclick="openLightbox(this)">
        <img src="https://picsum.photos/id/1024/400/300" class="gallery-item animals" onclick="openLightbox(this)">
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img">
        <div class="controls">
            <button onclick="prevImage()">⟨ Prev</button>
            <button onclick="nextImage()">Next ⟩</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
